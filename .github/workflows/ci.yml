name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }} smoke tests
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m py_compile main.py
      - name: Smoke test CLI flags
        run: |
          python main.py --version
          python main.py --help
          python main.py --no-nerd

  pyinstaller:
    name: PyInstaller macOS binary
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller
      - name: Build one-file binary
        run: pyinstaller --clean --onefile --name nitch-mac main.py
      - name: Smoke test binary
        run: |
          ./dist/nitch-mac --version
          ./dist/nitch-mac --help
      - name: Package artifact
        run: |
          mkdir -p artifacts
          cp dist/nitch-mac artifacts/nitch-mac-macos
          cd artifacts
          zip nitch-mac-macos.zip nitch-mac-macos
      - uses: actions/upload-artifact@v4
        with:
          name: nitch-mac-macos
          path: artifacts/nitch-mac-macos.zip

  release:
    name: Upload release artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [python-tests, pyinstaller]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*.zip
