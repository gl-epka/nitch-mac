name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }} smoke tests
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m py_compile main.py
      - name: Smoke test CLI flags
        run: |
          python main.py --version
          python main.py --help
          python main.py --no-nerd

  pyinstaller:
    name: PyInstaller macOS ${{ matrix.arch }} binary
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x86_64
          - os: macos-14
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller
      - name: Build one-file binary
        run: pyinstaller --clean --onefile --name gletch main.py
      - name: Smoke test binary
        run: |
          ./dist/gletch --version
          ./dist/gletch --help
      - name: Package artifact
        run: |
          mkdir -p artifacts
          cp dist/gletch artifacts/gletch-macos-${{ matrix.arch }}
          cd artifacts
          zip gletch-macos-${{ matrix.arch }}.zip gletch-macos-${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: gletch-macos-${{ matrix.arch }}
          path: artifacts/gletch-macos-${{ matrix.arch }}.zip

  release:
    name: Upload release artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [python-tests, pyinstaller]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*.zip
          fail_on_unmatched_files: true
