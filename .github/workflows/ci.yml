name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  pyinstaller:
    name: PyInstaller macOS arm64 onedir
    runs-on: macos-14
    env:
      ARCH: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller
      - name: Build onedir binary
        run: pyinstaller --clean --onedir --name gletch main.py
      - name: Smoke test binary
        run: |
          ./dist/gletch/gletch --version
          ./dist/gletch/gletch --help
      - name: Package artifact
        run: |
          mkdir -p artifacts
          cp -R dist/gletch artifacts/gletch-macos-${ARCH}
          cd artifacts
          zip -r gletch-macos-${ARCH}.zip gletch-macos-${ARCH}
      - uses: actions/upload-artifact@v4
        with:
          name: gletch-macos-arm64
          path: artifacts/gletch-macos-arm64.zip

  release:
    name: Upload release artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [pyinstaller]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*.zip
          fail_on_unmatched_files: true
